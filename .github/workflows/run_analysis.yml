name: Remote AI Stock Analysis

on:
  # 允許你從本地 local_app.py 遠程觸發
  repository_dispatch:
    types: [start_analysis]
  # 也允許你在 GitHub 網頁上手動點擊執行
  workflow_dispatch:
    inputs:
      stock_symbol:
        description: '輸入股票代碼 (e.g., NVDA)'
        required: true
        default: 'NVDA'

jobs:
  analyze:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 伺服器運算

    steps:
    - name: 1. 檢出代碼
      uses: actions/checkout@v4

    - name: 2. 設置 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 使用你最穩定的 3.10 版本

    - name: 3. 安裝所有依賴組件
      run: |
        python -m pip install --upgrade pip
        # 只要這一行，就能搞定所有 ModuleNotFoundError
        pip install -r requirements.txt

    - name: 4. 執行模型分析
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        STOCK_SYMBOL: ${{ github.event.client_payload.stock || github.event.inputs.stock_symbol }}
        # 增加這行，告訴 Python 你的代碼根目錄在哪
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python main.py --stock $STOCK_SYMBOL

    - name: 5. 儲存分析結果報告
      uses: actions/upload-artifact@v4
      with:
        name: analysis-report-${{ github.event.inputs.stock_symbol || 'remote' }}
        path: "*.md" # 儲存所有產出的 Markdown 報告

    - name: 6. 將分析報告推送到 GitHub Pages
      if: success()
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 建立一個臨時資料夾放網頁
        mkdir -p public
        # 將最新的 Markdown 報告複製並改名為 index.md，讓 GitHub Pages 能識別
        cp reports/report_$(date +'%Y%m%d').md index.md
        
        # 強制推送到一個名為 gh-pages 的分支
        git add index.md
        git commit -m "自動更新個股分析報告: $(date +'%Y-%m-%d')"
        git push -f origin main:gh-pages
