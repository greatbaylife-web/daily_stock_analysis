name: Remote AI Stock Analysis

on:
  # 允許你從本地 local_app.py 遠程觸發
  repository_dispatch:
    types: [start_analysis]
  # 也允許你在 GitHub 網頁上手動點擊執行
  workflow_dispatch:
    inputs:
      stock_symbol:
        description: '輸入股票代碼 (e.g., NVDA)'
        required: true
        default: 'NVDA'

jobs:
  analyze:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 伺服器運算

    steps:
    - name: 1. 檢出代碼
      uses: actions/checkout@v4

    - name: 2. 設置 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 使用你最穩定的 3.10 版本

    - name: 3. 安裝所有依賴組件
      run: |
        python -m pip install --upgrade pip
        # 只要這一行，就能搞定所有 ModuleNotFoundError
        pip install -r requirements.txt

    - name: 4. 執行模型分析
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        STOCK_SYMBOL: ${{ github.event.client_payload.stock || github.event.inputs.stock_symbol }}
        # 增加這行，告訴 Python 你的代碼根目錄在哪
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python main.py --stock $STOCK_SYMBOL

    - name: 5. 儲存分析結果報告 (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Stock-AI-Report-${{ github.event.inputs.stock_symbol || 'Daily' }}
        # 修正這裡：明確指定只抓 reports 資料夾下的 md 檔案
        path: reports/*.md 

    - name: 6. 將分析報告推送到 GitHub Pages (視覺化修正)
      if: success()
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 1. 抓取最新報告
        LATEST_REPORT=$(ls -t reports/report_*.md | head -1)
        echo "正在處理報告: $LATEST_REPORT"
        
        # 2. 建立一個乾淨的臨時目錄
        mkdir -p deploy
        
        # 3. 關鍵：將內容複製為 index.md 並加入 Jekyll 設定（確保 GitHub 正確渲染）
        echo "---" > deploy/index.md
        echo "layout: default" >> deploy/index.md
        echo "title: AI 股票分析日報" >> deploy/index.md
        echo "---" >> deploy/index.md
        cat "$LATEST_REPORT" >> deploy/index.md
        
        # 4. 加入一個空白的 .nojekyll 文件，防止 GitHub 過濾資料夾
        touch deploy/.nojekyll
        
        # 5. 強制推送到 gh-pages 分支
        cd deploy
        git init
        git add .
        git commit -m "🚀 網頁版報告更新: $(date +'%Y-%m-%d %H:%M')"
        git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
