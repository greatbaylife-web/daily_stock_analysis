name: Remote AI Stock Analysis

on:
  # 允許你從本地 local_app.py 遠程觸發
  repository_dispatch:
    types: [start_analysis]
  # 也允許你在 GitHub 網頁上手動點擊執行
  workflow_dispatch:
    inputs:
      stock_symbol:
        description: '輸入股票代碼 (e.g., NVDA)'
        required: true
        default: 'NVDA'

jobs:
  analyze:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 伺服器運算

    steps:
    - name: 1. 檢出代碼
      uses: actions/checkout@v4

    - name: 2. 設置 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 使用你最穩定的 3.10 版本

    - name: 3. 安裝所有依賴組件
      run: |
        python -m pip install --upgrade pip
        # 只要這一行，就能搞定所有 ModuleNotFoundError
        pip install -r requirements.txt

    - name: 4. 執行模型分析
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        STOCK_SYMBOL: ${{ github.event.client_payload.stock || github.event.inputs.stock_symbol }}
        # 增加這行，告訴 Python 你的代碼根目錄在哪
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python main.py --stock $STOCK_SYMBOL

    - name: 5. 儲存分析結果報告
      uses: actions/upload-artifact@v4
      with:
        name: analysis-report-${{ github.event.inputs.stock_symbol || 'remote' }}
        path: "*.md" # 儲存所有產出的 Markdown 報告

    - name: 6. 將分析報告推送到 GitHub Pages
      if: success()
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 1. 確保拿到最新的程式碼
        git fetch origin main
        
        # 2. 找到最新的報告檔案 (無視日期，直接抓最新的 .md)
        LATEST_REPORT=$(ls -t reports/report_*.md | head -1)
        echo "發現最新報告: $LATEST_REPORT"
        
        # 3. 將報告內容複製為 index.md (這是網頁首頁)
        cp "$LATEST_REPORT" index.md
        
        # 4. 強制推送到 gh-pages 分支
        # 注意：使用 --force 確保網頁內容即時更新
        git add index.md
        git commit -m "🚀 自動更新個股分析: $(date +'%Y-%m-%d %H:%M')"
        git push -f origin HEAD:gh-pages
        cp reports/report_$(date +'%Y%m%d').md index.md
        
        # 強制推送到一個名為 gh-pages 的分支
        git add index.md
        # 加上 || true 確保沒有變更時不會報錯
        git commit -m "🚀 自動更新個股分析: $(date +'%Y-%m-%d %H:%M')" || true
        git push -f origin HEAD:gh-pages
